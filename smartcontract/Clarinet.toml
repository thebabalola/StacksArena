[project]
name = 'stacks-arena'
description = 'Bitcoin-Native Gaming Platform — Lottery, Tournaments & Game Assets on Stacks L2'
authors = []
telemetry = true
cache_dir = './.cache'
requirements = []

[contracts.lottery-pool]
path = 'contracts/lottery-pool.clar'
clarity_version = 4
epoch = '3.3'

[contracts.tournament-manager]
path = 'contracts/tournament-manager.clar'
clarity_version = 4
epoch = '3.3'

[contracts.game-assets]
path = 'contracts/game-assets.clar'
clarity_version = 4
epoch = '3.3'

[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'
